name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/lftp_script.txt << 'EOF'
          set ftp:ssl-allow no
          set net:timeout 60
          set net:max-retries 5
          set net:reconnect-interval-base 5
          mirror -R --delete --parallel=4 --exclude-glob .git/ --exclude-glob .claude/ --exclude-glob ai/ --exclude-glob node_modules/ --exclude-glob templates/ --exclude-glob CATEGORIAS-Y-HERRAMIENTAS.md --exclude-glob PROYECTO.md --exclude-glob fix_*.js --exclude-glob check_*.js --exclude-glob update_*.js ./ /domains/herramientasdetexto.com/public_html/
          quit
          EOF
          lftp -u "$FTP_USER","$FTP_PASSWORD" "$FTP_SERVER" < /tmp/lftp_script.txt
