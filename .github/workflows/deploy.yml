name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASSWORD }}" \
            -e "
              set ftp:ssl-allow no;
              set net:timeout 60;
              set net:max-retries 5;
              set net:reconnect-interval-base 5;
              mirror -R --delete --parallel=4 \
                --exclude-glob .git/ \
                --exclude-glob .git \
                --exclude-glob .claude/ \
                --exclude-glob ai/ \
                --exclude-glob node_modules/ \
                --exclude-glob templates/ \
                --exclude-glob CATEGORIAS-Y-HERRAMIENTAS.md \
                --exclude-glob PROYECTO.md \
                --exclude-glob fix_*.js \
                --exclude-glob check_*.js \
                --exclude-glob update_*.js \
                ./ /domains/herramientasdetexto.com/public_html/;
              quit
            " \
            ${{ secrets.FTP_SERVER }}
