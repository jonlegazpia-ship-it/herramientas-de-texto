name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /home/u841476416/domains/herramientasdetexto.com/public_html/
          port: 21
          security: loose
          dangerous-clean-slate: true
          passive: true
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            **/ai/**
            **/.claude/**
            **/CATEGORIAS-Y-HERRAMIENTAS.md
            **/PROYECTO.md
            **/templates/**
